                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-12 md:mb-20">
                            {[
                                { icon: 'fa-calendar-check', title: '6/10 前繳訂', desc: '鎖定早鳥折扣', color: 'blue' },

                                { icon: 'fa-percentage', title: '學費 95 折', desc: '減輕家庭負擔計畫', color: 'red' },
                                { icon: 'fa-shield-check', title: '可全額退費', desc: '若不參加訂金全退', color: 'yellow' }

                                        <i className="fab fa-line mr-2"></i> LINE 立即預約諮詢

                                    <a href="tel:036572508" className="bg-white text-blue-600 px-10 py-5 rounded-2xl font-black text-xl shadow-2xl hover:scale-105 transition transform flex items-center justify-center">

                        </div>
                    </main>

                    {/* 頁尾 */}
                    <footer className="bg-white py-16 px-6 border-t border-slate-100">
                        <div className="max-w-5xl mx-auto flex flex-col items-center text-center">
                            <h4 className="text-2xl font-black text-slate-800 tracking-widest mb-4">金名德晉校</h4>
                            <p className="text-sm text-slate-400 max-w-md leading-loose">
                                竹北市文孝街23號(補教協會2樓) <br/>

                            <div className="mt-12 pt-8 border-t border-slate-100 w-full text-slate-300 text-[10px] tracking-[0.2em] font-bold">

                    {/* 3D 浮動 Line 按鈕 */}

                        <i className="fab fa-line text-white text-4xl"></i>

                    </a>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
